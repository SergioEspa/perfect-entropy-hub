<div class="container-fluid px-0 border-top border-secondary" style="height: calc(100vh - 120px);">
    <div class="row h-100 g-0">
        
        <!-- COLUMNA IZQUIERDA: Árbol de Navegación -->
        <div class="col-md-3 h-100 bg-dark border-end border-secondary overflow-y-scroll d-flex flex-column">
            <div class="p-3 border-bottom border-secondary position-sticky top-0 bg-dark z-1">
                <h6 class="mb-0 text-info font-monospace fw-bold"><i class="bi bi-funnel text-info me-2"></i>Filtrar Proyecto</h6>
            </div>
            
            <div class="p-0 accordion accordion-flush" id="tree-container-concept" data-bs-theme="dark">
            </div>
        </div>

        <!-- COLUMNA DERECHA: Ideas y Lore -->
        <div class="col-md-9 h-100 bg-black overflow-y-scroll d-flex flex-column relative">
            <div class="p-3 border-bottom border-secondary d-flex justify-content-between align-items-center position-sticky top-0 bg-black z-1">
                <h6 class="mb-0 text-light font-monospace fw-bold" id="concept-header-title">
                    <i class="bi bi-hexagon me-2 text-secondary"></i>Selecciona un objetivo
                </h6>
                <button class="btn btn-sm btn-info rounded-pill px-3 fw-bold" id="btn-add-concept" disabled>
                    <i class="bi bi-plus-lg me-1"></i>Añadir Lore
                </button>
            </div>
            
            <div class="p-4" id="concepts-container">
                <div class="text-center text-secondary mt-5 small">Navega por los álbumes o canciones en el panel izquierdo para leer o añadir conceptos y lore.</div>
            </div>
        </div>

    </div>
</div>

<!-- MODAL: CREAR/EDITAR CONCEPTO -->
<div class="modal fade" id="modalConcept" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark border-secondary text-light">
            <div class="modal-header border-secondary">
                <h5 class="modal-title font-monospace fw-bold text-info" id="concept-modal-title">
                    <i class="bi bi-pencil-square px-2"></i>Lore & Concepto
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="concept-form">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary mb-1">TÍTULO / IDEA</label>
                        <input type="text" id="concept-title" class="form-control bg-dark text-light border-secondary" placeholder="Ej. El viaje de Icarus..." required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary mb-1">ESTADO</label>
                        <select id="concept-status" class="form-select bg-dark text-light border-secondary">
                            <option value="BORRADOR">Borrador</option>
                            <option value="EN_DESARROLLO">En Desarrollo</option>
                            <option value="APROBADO">Aprobado / Definitivo</option>
                        </select>
                    </div>

                    <div class="mb-2">
                        <label class="form-label small fw-bold text-secondary mb-1">DESCRIPCIÓN Y NOTAS</label>
                        <textarea id="concept-desc" class="form-control bg-dark text-light border-secondary shadow-sm" rows="6" placeholder="Desarrolla aquí la narrativa, temática, estética visual asociada..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-outline-danger me-auto" id="btn-delete-concept-trigger" style="display: none;">Borrar</button>
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-info fw-bold" id="btn-save-concept">Guardar</button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL: ELIMINAR CONCEPTO -->
<div class="modal fade" id="confirmDeleteConcept" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark border-secondary text-light">
            <div class="modal-header border-secondary">
                <h5 class="modal-title font-monospace fw-bold text-danger">
                    <i class="bi bi-trash-fill px-2"></i>¿Eliminar Concepto?
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                Vas a eliminar esta narrativa y todo su texto de forma definitiva.
            </div>
            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-outline-secondary me-auto" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-danger fw-bold" id="btn-confirm-delete-concept">Eliminar</button>
            </div>
        </div>
    </div>
</div>
