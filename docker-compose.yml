version: '3.8'
services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: perfect_admin
      POSTGRES_PASSWORD: perfect_password
      POSTGRES_DB: perfect_entropy_db
    ports:
      - "6543:5432"
    volumes:
      - pg_band_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@perfectentropy.com 
      PGADMIN_DEFAULT_PASSWORD: operatorpass123
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pg_band_data: